<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGP Agent Builder</title>
    <link rel="stylesheet" href="/static/css/agp-ui.css">
</head>
<body class="dark-mode">
    <div class="builder-container">
        <div class="controls-panel">
            <h2>Agent Builder</h2>
            
            <div class="form-group">
                <label for="agent-name">Agent Name</label>
                <input type="text" id="agent-name" placeholder="Enter agent name">
            </div>

            <div class="form-group">
                <label for="agent-role">Role</label>
                <input type="text" id="agent-role" placeholder="Enter agent role">
            </div>

            <div class="trait-sliders">
                <!-- Trait sliders will be dynamically generated by builder.js -->
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="deploy-checkbox"> 
                    Deploy immediately
                </label>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="sandbox-checkbox"> 
                    Sandbox mode (temporary memory)
                </label>
            </div>

            <button id="create-agent-btn" class="primary-btn">Create Agent</button>
        </div>

        <div class="preview-panel">
            <h2>Agent Preview</h2>
            <div id="agent-avatar" class="avatar-preview">🤖</div>
            <div id="agent-preview" class="preview-details">
                <!-- Preview details will be populated by builder.js -->
            </div>
        </div>
    </div>

    <script src="/static/js/builder.js"></script>
</body>
</html>
